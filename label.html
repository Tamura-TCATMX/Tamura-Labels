<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tamura TMX Shipping Label</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f0f2f5;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: #fff;
      width: 100%;
      max-width: 440px;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 8px 30px rgba(0,0,0,0.12);
      margin-top: 24px;
    }
    .header {
      background: #1B3A6B;
      color: #fff;
      padding: 22px 20px;
      text-align: center;
    }
    .header h1 { font-size: 17px; letter-spacing: 0.3px; }
    .header span { font-size: 11px; opacity: 0.85; display: block; margin-top: 4px; }
    .fields { padding: 8px 20px 20px; }
    .field {
      padding: 14px 0;
      border-bottom: 1px solid #eee;
    }
    .field:last-child { border-bottom: none; }
    .field .label {
      font-size: 11px;
      font-weight: 700;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }
    .field .value {
      font-size: 19px;
      font-weight: 700;
      color: #1a1a1a;
      margin-top: 3px;
      word-break: break-word;
    }
    .footer {
      text-align: center;
      padding: 14px;
      font-size: 11px;
      color: #aaa;
      background: #fafafa;
    }
    .empty {
      padding: 40px 20px;
      text-align: center;
      color: #888;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <h1>TAMURA CORPORATION OF AMERICA</h1>
      <span>SHIPPING LABEL</span>
    </div>
    <div class="fields" id="fields"></div>
    <div class="footer">Tamura TMX Shipping Label</div>
  </div>

  <script>
    // Lee los parametros de la URL y arma la etiqueta. Sin servidor: todo
    // el dato viene en el enlace que codifico el QR.
    const params = new URLSearchParams(window.location.search);
    const campos = [
      { key: "item", label: "ITEM" },
      { key: "cust", label: "CUST ITEM" },
      { key: "desc", label: "DESC" },
      { key: "rev",  label: "REV" },
      { key: "po",   label: "PO" },
      { key: "qty",  label: "QTY" },
      { key: "gross", label: "GROSS WEIGHT" },
      { key: "net",  label: "NET WEIGHT" }
    ];

    const cont = document.getElementById("fields");
    let hayDatos = false;

    campos.forEach(c => {
      const val = params.get(c.key);
      if (val !== null && val !== "") hayDatos = true;
      const div = document.createElement("div");
      div.className = "field";
      div.innerHTML =
        '<div class="label">' + c.label + '</div>' +
        '<div class="value">' + (val ? escapeHtml(val) : "-") + '</div>';
      cont.appendChild(div);
    });

    if (!hayDatos) {
      cont.innerHTML = '<div class="empty">No se encontraron datos en el enlace.</div>';
    }

    function escapeHtml(s) {
      return s.replace(/[&<>"']/g, m => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
      }[m]));
    }
  </script>
</body>
</html>
